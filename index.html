<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Dev Hub</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --accent: #635bff;
      --accent-hover: #7c73ff;
      --accent-light: #eef2ff;
      --text-primary: #0a2540;
      --text-secondary: #425466;
      --text-tertiary: #697386;
      --bg-primary: #ffffff;
      --bg-secondary: #f6f8fa;
      --bg-sidebar: #f6f8fa;
      --border-color: #e3e8ee;
      --code-bg: #f6f8fa;
      --shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
      --font-sans: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      --font-mono: 'SF Mono', 'Fira Code', 'Fira Mono', Menlo, Consolas, monospace;
      --transition: 0.2s ease;
      --sidebar-width: 280px;
      --topnav-height: 64px;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      height: 100%;
      font-family: var(--font-sans);
      color: var(--text-primary);
      background: var(--bg-primary);
      overflow: hidden;
    }

    .app-container {
      display: flex;
      height: 100vh;
      width: 100%;
    }

    .topnav {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      height: var(--topnav-height);
      background: var(--bg-primary);
      border-bottom: 1px solid var(--border-color);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 32px;
      z-index: 1001;
    }

    .topnav-logo {
      font-size: 1.1rem;
      font-weight: 700;
      color: var(--text-primary);
      text-decoration: none;
      display: flex;
      align-items: center;
      gap: 10px;
      letter-spacing: -0.02em;
    }

    .topnav-logo::before {
      content: '';
      display: inline-block;
      width: 28px;
      height: 28px;
      background: var(--accent);
      border-radius: 6px;
    }

    .topnav-links {
      display: flex;
      gap: 24px;
      align-items: center;
    }

    .topnav-links a {
      color: var(--text-secondary);
      text-decoration: none;
      font-size: 0.9rem;
      font-weight: 500;
      transition: color var(--transition);
    }

    .topnav-links a:hover {
      color: var(--accent);
    }

    .topnav-links .cta-btn {
      background: var(--accent);
      color: #fff;
      padding: 8px 16px;
      border-radius: 6px;
      font-weight: 600;
      font-size: 0.85rem;
    }

    .topnav-links .cta-btn:hover {
      background: var(--accent-hover);
      color: #fff;
    }

    .sidebar {
      width: var(--sidebar-width);
      background: var(--bg-sidebar);
      color: var(--text-primary);
      display: flex;
      flex-direction: column;
      position: fixed;
      top: var(--topnav-height);
      left: 0;
      height: calc(100vh - var(--topnav-height));
      z-index: 1000;
      transition: transform var(--transition);
      border-right: 1px solid var(--border-color);
      overflow-y: auto;
    }

    .sidebar-nav {
      flex: 1;
      padding: 20px 16px;
    }

    .nav-section {
      margin-bottom: 8px;
    }

    .nav-section-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      width: 100%;
      padding: 8px 12px;
      background: none;
      border: none;
      color: var(--text-primary);
      font-size: 0.8rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      cursor: pointer;
      transition: color var(--transition);
      font-family: var(--font-sans);
      border-radius: 6px;
    }

    .nav-section-header:hover {
      color: var(--accent);
    }

    .nav-section-header .chevron {
      transition: transform var(--transition);
      font-size: 0.7rem;
    }

    .nav-section.open .nav-section-header .chevron {
      transform: rotate(180deg);
    }

    .nav-section-items {
      display: none;
      padding-left: 12px;
      margin-top: 4px;
    }

    .nav-section.open .nav-section-items {
      display: block;
    }

    .nav-item {
      display: block;
      width: 100%;
      padding: 8px 12px;
      text-align: left;
      background: none;
      border: none;
      color: var(--text-secondary);
      font-size: 0.9rem;
      cursor: pointer;
      transition: all var(--transition);
      border-radius: 6px;
      font-family: var(--font-sans);
      text-decoration: none;
    }

    .nav-item:hover {
      background: var(--bg-primary);
      color: var(--text-primary);
    }

    .nav-item.active {
      background: var(--bg-primary);
      color: var(--accent);
      font-weight: 600;
      box-shadow: 0 1px 2px rgba(0,0,0,0.04);
    }

    .sidebar-footer {
      padding: 16px;
      border-top: 1px solid var(--border-color);
      font-size: 0.85rem;
    }

    .sidebar-footer a {
      color: var(--accent);
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      transition: color var(--transition);
    }

    .sidebar-footer a:hover {
      color: var(--accent-hover);
      text-decoration: underline;
    }

    .main-content {
      margin-left: var(--sidebar-width);
      margin-top: var(--topnav-height);
      flex: 1;
      display: flex;
      flex-direction: column;
      height: calc(100vh - var(--topnav-height));
      overflow: hidden;
      background: var(--bg-primary);
    }

    .mobile-header {
      display: none;
      padding: 16px 20px;
      border-bottom: 1px solid var(--border-color);
      align-items: center;
      justify-content: space-between;
      background: var(--bg-primary);
    }

    .mobile-header h2 {
      font-size: 1.1rem;
      font-weight: 600;
    }

    .hamburger {
      background: none;
      border: none;
      font-size: 1.5rem;
      cursor: pointer;
      color: var(--text-primary);
      padding: 4px;
      line-height: 1;
    }

    .theme-toggle {
      background: var(--bg-primary);
      border: 1px solid var(--border-color);
      font-size: 0.85rem;
      cursor: pointer;
      color: var(--text-secondary);
      padding: 6px 12px;
      border-radius: 6px;
      transition: all var(--transition);
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      font-family: var(--font-sans);
      font-weight: 500;
      margin-top: 8px;
    }

    .theme-toggle:hover {
      border-color: var(--accent);
      color: var(--accent);
    }

    .tab-bar {
      display: flex;
      border-bottom: 1px solid var(--border-color);
      background: var(--bg-primary);
      padding: 0 32px;
      gap: 4px;
    }

    .tab-bar.hidden {
      display: none;
    }

    .tab-btn {
      padding: 16px 20px;
      background: none;
      border: none;
      border-bottom: 2px solid transparent;
      font-size: 0.95rem;
      font-weight: 500;
      color: var(--text-secondary);
      cursor: pointer;
      transition: all var(--transition);
      position: relative;
      top: 1px;
      font-family: var(--font-sans);
    }

    .tab-btn:hover {
      color: var(--text-primary);
    }

    .tab-btn.active {
      color: var(--accent);
      border-bottom-color: var(--accent);
      font-weight: 600;
    }

    .content-area {
      flex: 1;
      overflow-y: auto;
      padding: 40px;
      max-width: 100%;
    }

    .content-panel {
      display: none;
      animation: fadeIn 0.3s ease;
    }

    .content-panel.active {
      display: block;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(4px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .home-hero {
      margin-bottom: 48px;
      max-width: 720px;
    }

    .home-hero h2 {
      font-size: 2.5rem;
      font-weight: 800;
      margin-bottom: 16px;
      letter-spacing: -0.04em;
      line-height: 1.1;
    }

    .home-hero p {
      color: var(--text-secondary);
      font-size: 1.15rem;
      line-height: 1.7;
      max-width: 600px;
    }

    .home-cta {
      margin-top: 24px;
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }

    .btn-primary {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: var(--accent);
      color: #fff;
      padding: 12px 24px;
      border-radius: 8px;
      text-decoration: none;
      font-weight: 600;
      font-size: 0.95rem;
      transition: all var(--transition);
      border: none;
      cursor: pointer;
    }

    .btn-primary:hover {
      background: var(--accent-hover);
      transform: translateY(-1px);
      box-shadow: 0 4px 12px rgba(99, 91, 255, 0.25);
    }

    .btn-secondary {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: var(--bg-primary);
      color: var(--text-primary);
      padding: 12px 24px;
      border-radius: 8px;
      text-decoration: none;
      font-weight: 600;
      font-size: 0.95rem;
      border: 1px solid var(--border-color);
      transition: all var(--transition);
      cursor: pointer;
    }

    .btn-secondary:hover {
      border-color: var(--accent);
      color: var(--accent);
    }

    .projects-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 24px;
    }

    .project-card {
      background: var(--bg-primary);
      border: 1px solid var(--border-color);
      border-radius: 12px;
      padding: 28px;
      cursor: pointer;
      transition: all var(--transition);
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .project-card:hover {
      transform: translateY(-3px);
      box-shadow: var(--shadow);
      border-color: var(--accent);
    }

    .project-card h3 {
      font-size: 1.15rem;
      font-weight: 700;
      margin: 0;
      color: var(--text-primary);
    }

    .project-card p {
      color: var(--text-secondary);
      font-size: 0.95rem;
      line-height: 1.6;
      margin: 0;
      flex: 1;
    }

    .project-card .card-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 4px;
    }

    .project-card .tag {
      padding: 4px 10px;
      border-radius: 4px;
      font-size: 0.78rem;
      font-weight: 500;
      background: var(--bg-secondary);
      color: var(--text-secondary);
      font-family: var(--font-mono);
    }

    .doc-header {
      margin-bottom: 32px;
      max-width: 720px;
    }

    .doc-header h2 {
      font-size: 2rem;
      font-weight: 700;
      margin-bottom: 8px;
      letter-spacing: -0.03em;
    }

    .doc-header p {
      color: var(--text-secondary);
      font-size: 1.05rem;
      line-height: 1.7;
    }

    .doc-section {
      margin-bottom: 32px;
      max-width: 720px;
    }

    .doc-section h3 {
      font-size: 1.25rem;
      font-weight: 600;
      margin-bottom: 12px;
      padding-bottom: 8px;
      border-bottom: 1px solid var(--border-color);
      color: var(--text-primary);
    }

    .doc-section p, .doc-section li {
      line-height: 1.7;
      color: var(--text-secondary);
      margin-bottom: 8px;
    }

    .doc-section ul {
      margin-left: 24px;
      margin-bottom: 16px;
    }

    .doc-section li {
      margin-bottom: 6px;
    }

    .tag {
      display: inline-block;
      padding: 4px 10px;
      border-radius: 4px;
      font-size: 0.8rem;
      font-weight: 500;
      background: var(--bg-secondary);
      color: var(--text-secondary);
      margin-right: 6px;
      margin-bottom: 6px;
      font-family: var(--font-mono);
    }

    .formula-box {
      background: var(--code-bg);
      border: 1px solid var(--border-color);
      border-radius: 8px;
      padding: 16px 20px;
      font-family: var(--font-mono);
      font-size: 0.9rem;
      overflow-x: auto;
      margin: 12px 0;
      color: var(--text-secondary);
    }

    .iframe-container {
      width: 100%;
      height: calc(100vh - 200px);
      border: 1px solid var(--border-color);
      border-radius: 8px;
      overflow: hidden;
      background: var(--bg-secondary);
    }

    .iframe-container iframe {
      width: 100%;
      height: 100%;
      border: none;
    }

    .iframe-placeholder {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      color: var(--text-secondary);
      text-align: center;
      padding: 40px;
    }

    .iframe-placeholder svg {
      width: 64px;
      height: 64px;
      margin-bottom: 16px;
      opacity: 0.4;
    }

    .overlay {
      display: none;
      position: fixed;
      top: var(--topnav-height);
      left: 0;
      width: 100%;
      height: calc(100vh - var(--topnav-height));
      background: rgba(0, 0, 0, 0.3);
      z-index: 999;
      backdrop-filter: blur(2px);
    }

    .overlay.open {
      display: block;
    }

    [data-theme="dark"] {
      --text-primary: #e6e6e6;
      --text-secondary: #a0aec0;
      --text-tertiary: #718096;
      --bg-primary: #0a2540;
      --bg-secondary: #111b2d;
      --bg-sidebar: #0f1a2e;
      --border-color: #1e2d3d;
      --code-bg: #0f1a2e;
    }

    [data-theme="dark"] .topnav {
      background: var(--bg-primary);
      border-bottom-color: var(--border-color);
    }

    [data-theme="dark"] .project-card {
      background: var(--bg-primary);
      border-color: var(--border-color);
    }

    [data-theme="dark"] .project-card:hover {
      border-color: var(--accent);
    }

    [data-theme="dark"] .formula-box {
      background: var(--code-bg);
      border-color: var(--border-color);
    }

    [data-theme="dark"] .doc-section h3 {
      border-bottom-color: var(--border-color);
    }

    [data-theme="dark"] .iframe-container {
      background: var(--bg-secondary);
      border-color: var(--border-color);
    }

    [data-theme="dark"] .nav-item:hover {
      background: var(--bg-primary);
    }

    [data-theme="dark"] .nav-item.active {
      background: var(--bg-primary);
      box-shadow: 0 1px 2px rgba(0,0,0,0.2);
    }

    [data-theme="dark"] .theme-toggle {
      background: var(--bg-primary);
      border-color: var(--border-color);
    }

    @media (max-width: 768px) {
      .sidebar {
        transform: translateX(-100%);
        width: 280px;
        top: var(--topnav-height);
        height: calc(100vh - var(--topnav-height));
        box-shadow: 4px 0 12px rgba(0, 0, 0, 0.15);
      }

      .sidebar.open {
        transform: translateX(0);
      }

      .main-content {
        margin-left: 0;
      }

      .mobile-header {
        display: flex;
      }

      .topnav {
        display: none;
      }

      .content-area {
        padding: 24px 20px;
      }

      .tab-bar {
        padding: 0 16px;
      }

      .tab-btn {
        padding: 14px 14px;
        font-size: 0.9rem;
      }

      .iframe-container {
        height: calc(100vh - 200px);
      }

      .home-hero h2 {
        font-size: 1.8rem;
      }

      .projects-grid {
        grid-template-columns: 1fr;
      }

      .home-cta {
        flex-direction: column;
      }
    }

    @media (min-width: 769px) {
      .sidebar {
        transform: translateX(0) !important;
      }
    }

    ::-webkit-scrollbar {
      width: 8px;
      height: 8px;
    }

    ::-webkit-scrollbar-track {
      background: transparent;
    }

    ::-webkit-scrollbar-thumb {
      background: rgba(0, 0, 0, 0.15);
      border-radius: 4px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: rgba(0, 0, 0, 0.25);
    }

    .sidebar::-webkit-scrollbar-thumb {
      background: rgba(0, 0, 0, 0.1);
    }

    .sidebar::-webkit-scrollbar-thumb:hover {
      background: rgba(0, 0, 0, 0.15);
    }
  </style>
</head>
<body>
  <div class="app-container">
    <div class="overlay" id="overlay"></div>

    <nav class="topnav" id="topnav">
      <a href="#" class="topnav-logo" onclick="loadHome(); return false;">My Dev Hub</a>
      <div class="topnav-links">
        <a href="#" onclick="loadHome(); return false;">Docs</a>
        <a href="#" onclick="switchTab('live'); return false;">Live Demo</a>
        <a href="https://github.com/Aspiral25/BuildingHouseCalculator" target="_blank" rel="noopener noreferrer" class="cta-btn">GitHub</a>
      </div>
    </nav>

    <aside class="sidebar" id="sidebar">
      <nav class="sidebar-nav" id="sidebarNav"></nav>
      <div class="sidebar-footer">
        <button class="theme-toggle" id="themeToggle" aria-label="Toggle theme">🌙 Dark</button>
        <a href="https://ko-fi.com/nsdotmy" target="_blank" rel="noopener noreferrer" style="margin-top: 8px; display: inline-flex;">
          <span>☕</span> Buy me a coffee
        </a>
      </div>
    </aside>

    <main class="main-content">
      <div class="mobile-header">
        <h2 id="mobileTitle">My Dev Hub</h2>
        <button class="hamburger" id="hamburger" aria-label="Toggle menu">☰</button>
      </div>

      <div class="tab-bar hidden" id="tabBar">
        <button class="tab-btn active" data-tab="docs">Documentation</button>
        <button class="tab-btn" data-tab="live">Live App</button>
      </div>

      <div class="content-area" id="contentArea">
        <div class="content-panel active" id="docsPanel"></div>
        <div class="content-panel" id="livePanel">
          <div class="iframe-container" id="iframeContainer"></div>
        </div>
      </div>
    </main>
  </div>

  <script>
    const projects = [
      {
        id: 'construction-calculator',
        label: 'Construction Calculator',
        section: 'Get started',
        docs: {
          title: 'Construction Material Calculator',
          description: 'A web and desktop tool to estimate construction materials for walls, flooring, concrete, and paint. Built for Malaysian contractors, builders, and DIY enthusiasts.',
          techStack: ['HTML5', 'CSS3', 'JavaScript', 'Python', 'PyQt6'],
          features: [
            'Wall Material Calculator - Estimates bricks, cement, and sand for wall construction and plastering',
            'Floor Tile Calculator - Calculates tile counts (1ft and 2ft), mortar, and adhesive requirements',
            'Concrete Calculator - Provides volume, ready-mix cost, and manual mix breakdown (cement bags, sand, aggregate, BRC)',
            'Paint Calculator - Computes surface area, sealer/primer, and paint litres based on brand coverage rates'
          ],
          formulas: [
            'Cement bulk density: 1440 kg/m³ (50 kg bags → 28.8 bags/m³)',
            'Sand conversion: 1 ela = 1.308 m³',
            'Brick face area: 0.22m × 0.07m (Standard Malaysian brick 230×70×100mm)',
            'Mortar thickness: 30mm, mix ratio 1:4 (cement:sand)',
            'Plaster thickness: 19mm, mix ratio 1:4',
            'Concrete mix ratio: 1:2:2 (cement:sand:aggregate)',
            'BRC sheet size: 2.2m × 6m (A6 JKR Spec reinforcing mesh)'
          ],
          notes: 'The web version is a single-file application with no build step or dependencies. The legacy desktop version uses PyQt6 with QFormLayout and QButtonGroup for exclusive paint brand selection. The app supports bilingual interface (Malay/English) with localStorage persistence.'
        },
        iframeSrc: 'calculator.html',
        hasIframe: true
      },
      {
        id: 'regex-playground',
        label: 'Regex Playground',
        section: 'Tools',
        docs: {
          title: 'Regex Playground',
          description: 'A lightweight, browser-based regular expression tester. Write patterns, test against sample text, and get instant match results with explanation support.',
          techStack: ['HTML5', 'CSS3', 'JavaScript'],
          features: [
            'Real-time pattern matching against input text',
            'Match highlighting with color-coded groups',
            'Common pattern library for quick insertion',
            'Flag support (g, i, m, s)',
            'Copy pattern and match results to clipboard'
          ],
          formulas: [],
          notes: 'Built with vanilla JavaScript and Regex engine. No external dependencies. Useful for developers, data analysts, and students learning regular expressions.'
        },
        iframeSrc: 'about:blank',
        hasIframe: true
      }
    ];

    let currentProject = -1;
    let currentTab = 'docs';

    const sidebarNav = document.getElementById('sidebarNav');
    const docsPanel = document.getElementById('docsPanel');
    const livePanel = document.getElementById('livePanel');
    const iframeContainer = document.getElementById('iframeContainer');
    const sidebar = document.getElementById('sidebar');
    const overlay = document.getElementById('overlay');
    const hamburger = document.getElementById('hamburger');
    const mobileTitle = document.getElementById('mobileTitle');
    const tabBar = document.getElementById('tabBar');
    const tabBtns = document.querySelectorAll('.tab-btn');
    const themeToggle = document.getElementById('themeToggle');

    function getSections() {
      const sections = {};
      projects.forEach((project, index) => {
        if (!sections[project.section]) {
          sections[project.section] = [];
        }
        sections[project.section].push({ ...project, index });
      });
      return sections;
    }

    function renderSidebar() {
      sidebarNav.innerHTML = '';

      const homeBtn = document.createElement('button');
      homeBtn.className = 'nav-item' + (currentProject === -1 ? ' active' : '');
      homeBtn.textContent = 'Home';
      homeBtn.onclick = () => loadHome();
      sidebarNav.appendChild(homeBtn);

      const sections = getSections();
      Object.keys(sections).forEach(sectionName => {
        const section = document.createElement('div');
        section.className = 'nav-section' + (projects.some((p, i) => p.section === sectionName && i === currentProject) ? ' open' : '');

        const sectionHeader = document.createElement('button');
        sectionHeader.className = 'nav-section-header';
        sectionHeader.innerHTML = `<span>${sectionName}</span><span class="chevron">▾</span>`;
        sectionHeader.onclick = () => {
          section.classList.toggle('open');
        };
        section.appendChild(sectionHeader);

        const sectionItems = document.createElement('div');
        sectionItems.className = 'nav-section-items';

        sections[sectionName].forEach(project => {
          const btn = document.createElement('button');
          btn.className = 'nav-item' + (currentProject === project.index ? ' active' : '');
          btn.textContent = project.label;
          btn.onclick = () => loadProject(project.index);
          sectionItems.appendChild(btn);
        });

        section.appendChild(sectionItems);
        sidebarNav.appendChild(section);
      });
    }

    function renderHome() {
      let html = `
        <div class="home-hero">
          <h2>My Dev Hub</h2>
          <p>Welcome to my central portfolio. Browse through the projects below to explore documentation, source code, and live demos of my web tools.</p>
          <div class="home-cta">
            <button class="btn-primary" onclick="loadProject(0)">Explore Construction Calculator →</button>
            <button class="btn-secondary" onclick="loadProject(1)">Try Regex Playground →</button>
          </div>
        </div>
        <div class="projects-grid">
      `;

      projects.forEach((project, index) => {
        html += `
          <div class="project-card" onclick="loadProject(${index})">
            <h3>${project.label}</h3>
            <p>${project.docs.description}</p>
            <div class="card-tags">
              ${project.docs.techStack.map(t => `<span class="tag">${t}</span>`).join('')}
            </div>
          </div>
        `;
      });

      html += `</div>`;
      docsPanel.innerHTML = html;
    }

    function renderDocs(project) {
      const d = project.docs;
      let html = `
        <div class="doc-header">
          <h2>${d.title}</h2>
          <p>${d.description}</p>
        </div>
      `;

      if (d.techStack.length > 0) {
        html += `
          <div class="doc-section">
            <h3>Tech Stack</h3>
            <div>${d.techStack.map(t => `<span class="tag">${t}</span>`).join('')}</div>
          </div>
        `;
      }

      if (d.features.length > 0) {
        html += `
          <div class="doc-section">
            <h3>Features</h3>
            <ul>${d.features.map(f => `<li>${f}</li>`).join('')}</ul>
          </div>
        `;
      }

      if (d.formulas.length > 0) {
        html += `
          <div class="doc-section">
            <h3>Key Formulas & Constants</h3>
            ${d.formulas.map(f => `<div class="formula-box">${f}</div>`).join('')}
          </div>
        `;
      }

      if (d.notes) {
        html += `
          <div class="doc-section">
            <h3>Notes</h3>
            <p>${d.notes}</p>
          </div>
        `;
      }

      docsPanel.innerHTML = html;
    }

    function renderLiveApp(project) {
      if (!project.hasIframe || !project.iframeSrc) {
        iframeContainer.innerHTML = `
          <div class="iframe-placeholder">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <rect x="2" y="3" width="20" height="14" rx="2" ry="2"></rect>
              <line x1="8" y1="21" x2="16" y2="21"></line>
              <line x1="12" y1="17" x2="12" y2="21"></line>
            </svg>
            <p><strong>Live app not available</strong></p>
            <p style="font-size: 0.9rem; margin-top: 8px;">This tool does not have an embedded live demo yet.</p>
          </div>
        `;
        return;
      }

      iframeContainer.innerHTML = `
        <iframe src="${project.iframeSrc}" 
                title="${project.docs.title} - Live App" 
                sandbox="allow-scripts allow-same-origin allow-forms allow-popups"
                loading="lazy">
        </iframe>
      `;
    }

    function loadHome() {
      currentProject = -1;
      renderSidebar();
      mobileTitle.textContent = 'My Dev Hub';
      tabBar.classList.add('hidden');
      renderHome();
      docsPanel.classList.add('active');
      livePanel.classList.remove('active');
      closeSidebar();
    }

    function loadProject(index) {
      currentProject = index;
      const project = projects[index];
      renderSidebar();
      mobileTitle.textContent = project.label;
      tabBar.classList.remove('hidden');
      renderDocs(project);
      renderLiveApp(project);
      switchTab('live');
      closeSidebar();
    }

    function switchTab(tab) {
      currentTab = tab;
      tabBtns.forEach(btn => {
        if (btn.dataset.tab === tab) {
          btn.classList.add('active');
        } else {
          btn.classList.remove('active');
        }
      });

      if (tab === 'docs') {
        docsPanel.classList.add('active');
        livePanel.classList.remove('active');
      } else {
        docsPanel.classList.remove('active');
        livePanel.classList.add('active');
      }
    }

    function openSidebar() {
      sidebar.classList.add('open');
      overlay.classList.add('open');
      document.body.style.overflow = 'hidden';
    }

    function closeSidebar() {
      sidebar.classList.remove('open');
      overlay.classList.remove('open');
      document.body.style.overflow = '';
    }

    hamburger.addEventListener('click', () => {
      if (sidebar.classList.contains('open')) {
        closeSidebar();
      } else {
        openSidebar();
      }
    });

    overlay.addEventListener('click', closeSidebar);

    tabBtns.forEach(btn => {
      btn.addEventListener('click', () => switchTab(btn.dataset.tab));
    });

    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') {
        closeSidebar();
      }
    });

    window.addEventListener('resize', () => {
      if (window.innerWidth > 768) {
        closeSidebar();
      }
    });

    function applyTheme(theme) {
      document.documentElement.setAttribute('data-theme', theme);
      themeToggle.textContent = theme === 'dark' ? '☀️ Light' : '🌙 Dark';
      localStorage.setItem('theme', theme);
    }

    themeToggle.addEventListener('click', () => {
      const current = document.documentElement.getAttribute('data-theme');
      applyTheme(current === 'dark' ? 'light' : 'dark');
    });

    applyTheme(localStorage.getItem('theme') || 'light');

    renderSidebar();
    loadHome();
  </script>
</body>
</html>
