<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Dev Hub</title>
  <style>
    :root {
      --sidebar-width: 250px;
      --sidebar-bg: #1e1e2e;
      --sidebar-text: #cdd6f4;
      --sidebar-hover: #313244;
      --sidebar-active: #45475a;
      --sidebar-active-border: #89b4fa;
      --accent: #89b4fa;
      --accent-hover: #b4befe;
      --text-primary: #1e1e2e;
      --text-secondary: #6c7086;
      --bg-primary: #ffffff;
      --bg-secondary: #f5f5f5;
      --border-color: #e0e0e0;
      --code-bg: #f8f8f8;
      --shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
      --font-mono: 'SF Mono', 'Fira Code', 'Fira Mono', Menlo, Consolas, monospace;
      --font-sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
      --transition: 0.2s ease;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      height: 100%;
      font-family: var(--font-sans);
      color: var(--text-primary);
      background: var(--bg-primary);
      overflow: hidden;
    }

    .app-container {
      display: flex;
      height: 100vh;
      width: 100%;
    }

    /* Sidebar */
    .sidebar {
      width: var(--sidebar-width);
      background: var(--sidebar-bg);
      color: var(--sidebar-text);
      display: flex;
      flex-direction: column;
      position: fixed;
      top: 0;
      left: 0;
      height: 100vh;
      z-index: 1000;
      transition: transform var(--transition);
      border-right: 1px solid rgba(255, 255, 255, 0.05);
    }

    .sidebar-header {
      padding: 24px 20px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.08);
    }

    .sidebar-header h1 {
      font-size: 1.25rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .sidebar-header h1::before {
      content: '';
      display: inline-block;
      width: 24px;
      height: 24px;
      background: var(--accent);
      border-radius: 6px;
    }

    .sidebar-nav {
      flex: 1;
      overflow-y: auto;
      padding: 16px 0;
    }

    .nav-item {
      display: block;
      width: 100%;
      padding: 12px 20px;
      text-align: left;
      background: none;
      border: none;
      color: var(--sidebar-text);
      font-size: 0.95rem;
      cursor: pointer;
      transition: background var(--transition), color var(--transition);
      border-left: 3px solid transparent;
      font-family: var(--font-sans);
    }

    .nav-item:hover {
      background: var(--sidebar-hover);
      color: #fff;
    }

    .nav-item.active {
      background: var(--sidebar-active);
      color: #fff;
      border-left-color: var(--sidebar-active-border);
      font-weight: 600;
    }

    .sidebar-footer {
      padding: 16px 20px;
      border-top: 1px solid rgba(255, 255, 255, 0.08);
      font-size: 0.85rem;
    }

    .sidebar-footer a {
      color: var(--accent);
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      transition: color var(--transition);
    }

    .sidebar-footer a:hover {
      color: var(--accent-hover);
      text-decoration: underline;
    }

    /* Main Content */
    .main-content {
      margin-left: var(--sidebar-width);
      flex: 1;
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
      background: var(--bg-primary);
    }

    .mobile-header {
      display: none;
      padding: 16px 20px;
      border-bottom: 1px solid var(--border-color);
      align-items: center;
      justify-content: space-between;
      background: var(--bg-primary);
    }

    .mobile-header h2 {
      font-size: 1.1rem;
      font-weight: 600;
    }

    .hamburger {
      background: none;
      border: none;
      font-size: 1.5rem;
      cursor: pointer;
      color: var(--text-primary);
      padding: 4px;
      line-height: 1;
    }

    .tab-bar {
      display: flex;
      border-bottom: 1px solid var(--border-color);
      background: var(--bg-primary);
      padding: 0 32px;
      gap: 4px;
    }

    .tab-bar.hidden {
      display: none;
    }

    .tab-btn {
      padding: 16px 20px;
      background: none;
      border: none;
      border-bottom: 2px solid transparent;
      font-size: 0.95rem;
      font-weight: 500;
      color: var(--text-secondary);
      cursor: pointer;
      transition: all var(--transition);
      position: relative;
      top: 1px;
      font-family: var(--font-sans);
    }

    .tab-btn:hover {
      color: var(--text-primary);
    }

    .tab-btn.active {
      color: var(--accent);
      border-bottom-color: var(--accent);
      font-weight: 600;
    }

    .content-area {
      flex: 1;
      overflow-y: auto;
      padding: 40px;
      max-width: 100%;
    }

    .content-panel {
      display: none;
      animation: fadeIn 0.3s ease;
    }

    .content-panel.active {
      display: block;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(4px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* Home / Central Page */
    .home-hero {
      margin-bottom: 48px;
    }

    .home-hero h2 {
      font-size: 2.5rem;
      font-weight: 800;
      margin-bottom: 12px;
      letter-spacing: -0.04em;
    }

    .home-hero p {
      color: var(--text-secondary);
      font-size: 1.15rem;
      line-height: 1.6;
      max-width: 640px;
    }

    .projects-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 24px;
    }

    .project-card {
      background: var(--bg-primary);
      border: 1px solid var(--border-color);
      border-radius: 12px;
      padding: 28px;
      cursor: pointer;
      transition: all var(--transition);
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .project-card:hover {
      transform: translateY(-3px);
      box-shadow: var(--shadow);
      border-color: var(--accent);
    }

    .project-card h3 {
      font-size: 1.15rem;
      font-weight: 700;
      margin: 0;
    }

    .project-card p {
      color: var(--text-secondary);
      font-size: 0.95rem;
      line-height: 1.6;
      margin: 0;
      flex: 1;
    }

    .project-card .card-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 4px;
    }

    .project-card .tag {
      padding: 4px 10px;
      border-radius: 4px;
      font-size: 0.78rem;
      font-weight: 500;
      background: var(--bg-secondary);
      color: var(--text-secondary);
      font-family: var(--font-mono);
    }

    /* Documentation Styles */
    .doc-header {
      margin-bottom: 32px;
    }

    .doc-header h2 {
      font-size: 2rem;
      font-weight: 700;
      margin-bottom: 8px;
      letter-spacing: -0.03em;
    }

    .doc-header p {
      color: var(--text-secondary);
      font-size: 1.05rem;
      line-height: 1.6;
    }

    .doc-section {
      margin-bottom: 32px;
    }

    .doc-section h3 {
      font-size: 1.25rem;
      font-weight: 600;
      margin-bottom: 12px;
      padding-bottom: 8px;
      border-bottom: 1px solid var(--border-color);
    }

    .doc-section p, .doc-section li {
      line-height: 1.7;
      color: var(--text-primary);
      margin-bottom: 8px;
    }

    .doc-section ul {
      margin-left: 24px;
      margin-bottom: 16px;
    }

    .doc-section li {
      margin-bottom: 6px;
    }

    .tag {
      display: inline-block;
      padding: 4px 10px;
      border-radius: 4px;
      font-size: 0.8rem;
      font-weight: 500;
      background: var(--bg-secondary);
      color: var(--text-secondary);
      margin-right: 6px;
      margin-bottom: 6px;
      font-family: var(--font-mono);
    }

    .tag.highlight {
      background: #e3f2fd;
      color: #1565c0;
    }

    .formula-box {
      background: var(--code-bg);
      border: 1px solid var(--border-color);
      border-radius: 8px;
      padding: 16px 20px;
      font-family: var(--font-mono);
      font-size: 0.9rem;
      overflow-x: auto;
      margin: 12px 0;
    }

    /* Iframe Container */
    .iframe-container {
      width: 100%;
      height: calc(100vh - 140px);
      border: 1px solid var(--border-color);
      border-radius: 8px;
      overflow: hidden;
      background: var(--bg-secondary);
    }

    .iframe-container iframe {
      width: 100%;
      height: 100%;
      border: none;
    }

    .iframe-placeholder {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      color: var(--text-secondary);
      text-align: center;
      padding: 40px;
    }

    .iframe-placeholder svg {
      width: 64px;
      height: 64px;
      margin-bottom: 16px;
      opacity: 0.4;
    }

    /* Mobile Overlay */
    .overlay {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.5);
      z-index: 999;
    }

    .overlay.open {
      display: block;
    }

    /* Responsive */
    @media (max-width: 768px) {
      .sidebar {
        transform: translateX(-100%);
        width: 280px;
        box-shadow: 4px 0 12px rgba(0, 0, 0, 0.15);
      }

      .sidebar.open {
        transform: translateX(0);
      }

      .main-content {
        margin-left: 0;
      }

      .mobile-header {
        display: flex;
      }

      .content-area {
        padding: 24px 20px;
      }

      .tab-bar {
        padding: 0 16px;
      }

      .tab-btn {
        padding: 14px 14px;
        font-size: 0.9rem;
      }

      .iframe-container {
        height: calc(100vh - 120px);
      }

      .home-hero h2 {
        font-size: 1.8rem;
      }

      .projects-grid {
        grid-template-columns: 1fr;
      }
    }

    @media (min-width: 769px) {
      .sidebar {
        transform: translateX(0) !important;
      }
    }

    /* Scrollbar */
    ::-webkit-scrollbar {
      width: 8px;
      height: 8px;
    }

    ::-webkit-scrollbar-track {
      background: transparent;
    }

    ::-webkit-scrollbar-thumb {
      background: rgba(0, 0, 0, 0.15);
      border-radius: 4px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: rgba(0, 0, 0, 0.25);
    }

    .sidebar::-webkit-scrollbar-thumb {
      background: rgba(255, 255, 255, 0.15);
    }

    .sidebar::-webkit-scrollbar-thumb:hover {
      background: rgba(255, 255, 255, 0.25);
    }
  </style>
</head>
<body>
  <div class="app-container">
    <div class="overlay" id="overlay"></div>

    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <h1>My Dev Hub</h1>
      </div>
      <nav class="sidebar-nav" id="sidebarNav"></nav>
      <div class="sidebar-footer">
        <a href="https://ko-fi.com/nsdotmy" target="_blank" rel="noopener noreferrer">
          <span>☕</span> Buy me a coffee
        </a>
      </div>
    </aside>

    <main class="main-content">
      <div class="mobile-header">
        <h2 id="mobileTitle">My Dev Hub</h2>
        <button class="hamburger" id="hamburger" aria-label="Toggle menu">☰</button>
      </div>

      <div class="tab-bar hidden" id="tabBar">
        <button class="tab-btn active" data-tab="docs">Documentation</button>
        <button class="tab-btn" data-tab="live">Live App</button>
      </div>

      <div class="content-area" id="contentArea">
        <div class="content-panel active" id="docsPanel"></div>
        <div class="content-panel" id="livePanel">
          <div class="iframe-container" id="iframeContainer"></div>
        </div>
      </div>
    </main>
  </div>

  <script>
    // Project Data
    const projects = [
      {
        id: 'construction-calculator',
        label: 'Construction Calculator',
        docs: {
          title: 'Construction Material Calculator',
          description: 'A web and desktop tool to estimate construction materials for walls, flooring, concrete, and paint. Built for Malaysian contractors, builders, and DIY enthusiasts.',
          techStack: ['HTML5', 'CSS3', 'JavaScript', 'Python', 'PyQt6'],
          features: [
            'Wall Material Calculator - Estimates bricks, cement, and sand for wall construction and plastering',
            'Floor Tile Calculator - Calculates tile counts (1ft and 2ft), mortar, and adhesive requirements',
            'Concrete Calculator - Provides volume, ready-mix cost, and manual mix breakdown (cement bags, sand, aggregate, BRC)',
            'Paint Calculator - Computes surface area, sealer/primer, and paint litres based on brand coverage rates'
          ],
          formulas: [
            'Cement bulk density: 1440 kg/m³ (50 kg bags → 28.8 bags/m³)',
            'Sand conversion: 1 ela = 1.308 m³',
            'Brick face area: 0.22m × 0.07m (Standard Malaysian brick 230×70×100mm)',
            'Mortar thickness: 30mm, mix ratio 1:4 (cement:sand)',
            'Plaster thickness: 19mm, mix ratio 1:4',
            'Concrete mix ratio: 1:2:2 (cement:sand:aggregate)',
            'BRC sheet size: 2.2m × 6m (A6 JKR Spec reinforcing mesh)'
          ],
          notes: 'The web version is a single-file application with no build step or dependencies. The legacy desktop version uses PyQt6 with QFormLayout and QButtonGroup for exclusive paint brand selection. The app supports bilingual interface (Malay/English) with localStorage persistence.'
        },
        iframeSrc: 'calculator.html',
        hasIframe: true
      },
      {
        id: 'regex-playground',
        label: 'Regex Playground',
        docs: {
          title: 'Regex Playground',
          description: 'A lightweight, browser-based regular expression tester. Write patterns, test against sample text, and get instant match results with explanation support.',
          techStack: ['HTML5', 'CSS3', 'JavaScript'],
          features: [
            'Real-time pattern matching against input text',
            'Match highlighting with color-coded groups',
            'Common pattern library for quick insertion',
            'Flag support (g, i, m, s)',
            'Copy pattern and match results to clipboard'
          ],
          formulas: [],
          notes: 'Built with vanilla JavaScript and Regex engine. No external dependencies. Useful for developers, data analysts, and students learning regular expressions.'
        },
        iframeSrc: 'about:blank',
        hasIframe: true
      }
    ];

    let currentProject = -1; // -1 = home
    let currentTab = 'docs';

    // DOM Elements
    const sidebarNav = document.getElementById('sidebarNav');
    const docsPanel = document.getElementById('docsPanel');
    const livePanel = document.getElementById('livePanel');
    const iframeContainer = document.getElementById('iframeContainer');
    const sidebar = document.getElementById('sidebar');
    const overlay = document.getElementById('overlay');
    const hamburger = document.getElementById('hamburger');
    const mobileTitle = document.getElementById('mobileTitle');
    const tabBar = document.getElementById('tabBar');
    const tabBtns = document.querySelectorAll('.tab-btn');

    // Render sidebar navigation (with Home item)
    function renderSidebar() {
      sidebarNav.innerHTML = '';

      // Home button
      const homeBtn = document.createElement('button');
      homeBtn.className = 'nav-item' + (currentProject === -1 ? ' active' : '');
      homeBtn.textContent = 'Home';
      homeBtn.onclick = () => loadHome();
      sidebarNav.appendChild(homeBtn);

      // Project buttons
      projects.forEach((project, index) => {
        const btn = document.createElement('button');
        btn.className = 'nav-item' + (currentProject === index ? ' active' : '');
        btn.textContent = project.label;
        btn.onclick = () => loadProject(index);
        sidebarNav.appendChild(btn);
      });
    }

    // Render home / central overview page
    function renderHome() {
      let html = `
        <div class="home-hero">
          <h2>My Dev Hub</h2>
          <p>Welcome to my central portfolio. Browse through the projects below to explore documentation, source code, and live demos of my web tools.</p>
        </div>
        <div class="projects-grid">
      `;

      projects.forEach((project, index) => {
        html += `
          <div class="project-card" onclick="loadProject(${index})">
            <h3>${project.label}</h3>
            <p>${project.docs.description}</p>
            <div class="card-tags">
              ${project.docs.techStack.map(t => `<span class="tag">${t}</span>`).join('')}
            </div>
          </div>
        `;
      });

      html += `</div>`;
      docsPanel.innerHTML = html;
    }

    // Render documentation content
    function renderDocs(project) {
      const d = project.docs;
      let html = `
        <div class="doc-header">
          <h2>${d.title}</h2>
          <p>${d.description}</p>
        </div>
      `;

      if (d.techStack.length > 0) {
        html += `
          <div class="doc-section">
            <h3>Tech Stack</h3>
            <div>${d.techStack.map(t => `<span class="tag">${t}</span>`).join('')}</div>
          </div>
        `;
      }

      if (d.features.length > 0) {
        html += `
          <div class="doc-section">
            <h3>Features</h3>
            <ul>${d.features.map(f => `<li>${f}</li>`).join('')}</ul>
          </div>
        `;
      }

      if (d.formulas.length > 0) {
        html += `
          <div class="doc-section">
            <h3>Key Formulas & Constants</h3>
            ${d.formulas.map(f => `<div class="formula-box">${f}</div>`).join('')}
          </div>
        `;
      }

      if (d.notes) {
        html += `
          <div class="doc-section">
            <h3>Notes</h3>
            <p>${d.notes}</p>
          </div>
        `;
      }

      docsPanel.innerHTML = html;
    }

    // Render iframe / live app
    function renderLiveApp(project) {
      if (!project.hasIframe || !project.iframeSrc) {
        iframeContainer.innerHTML = `
          <div class="iframe-placeholder">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <rect x="2" y="3" width="20" height="14" rx="2" ry="2"></rect>
              <line x1="8" y1="21" x2="16" y2="21"></line>
              <line x1="12" y1="17" x2="12" y2="21"></line>
            </svg>
            <p><strong>Live app not available</strong></p>
            <p style="font-size: 0.9rem; margin-top: 8px;">This tool does not have an embedded live demo yet.</p>
          </div>
        `;
        return;
      }

      iframeContainer.innerHTML = `
        <iframe src="${project.iframeSrc}" 
                title="${project.docs.title} - Live App" 
                sandbox="allow-scripts allow-same-origin allow-forms allow-popups"
                loading="lazy">
        </iframe>
      `;
    }

    // Load home / central page
    function loadHome() {
      currentProject = -1;
      renderSidebar();
      mobileTitle.textContent = 'My Dev Hub';
      tabBar.classList.add('hidden');
      renderHome();
      docsPanel.classList.add('active');
      livePanel.classList.remove('active');
      closeSidebar();
    }

    // Load a project
    function loadProject(index) {
      currentProject = index;
      const project = projects[index];

      // Update sidebar active state
      renderSidebar();

      // Update mobile title
      mobileTitle.textContent = project.label;

      // Show tab bar
      tabBar.classList.remove('hidden');

      // Render content
      renderDocs(project);
      renderLiveApp(project);

      // Ensure correct tab is shown
      switchTab('live');

      // Close mobile sidebar
      closeSidebar();
    }

    // Switch tabs
    function switchTab(tab) {
      currentTab = tab;

      tabBtns.forEach(btn => {
        if (btn.dataset.tab === tab) {
          btn.classList.add('active');
        } else {
          btn.classList.remove('active');
        }
      });

      if (tab === 'docs') {
        docsPanel.classList.add('active');
        livePanel.classList.remove('active');
      } else {
        docsPanel.classList.remove('active');
        livePanel.classList.add('active');
      }
    }

    // Mobile sidebar toggle
    function openSidebar() {
      sidebar.classList.add('open');
      overlay.classList.add('open');
      document.body.style.overflow = 'hidden';
    }

    function closeSidebar() {
      sidebar.classList.remove('open');
      overlay.classList.remove('open');
      document.body.style.overflow = '';
    }

    // Event Listeners
    hamburger.addEventListener('click', () => {
      if (sidebar.classList.contains('open')) {
        closeSidebar();
      } else {
        openSidebar();
      }
    });

    overlay.addEventListener('click', closeSidebar);

    tabBtns.forEach(btn => {
      btn.addEventListener('click', () => switchTab(btn.dataset.tab));
    });

    // Handle escape key to close sidebar
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') {
        closeSidebar();
      }
    });

    // Handle window resize - close sidebar on desktop
    window.addEventListener('resize', () => {
      if (window.innerWidth > 768) {
        closeSidebar();
      }
    });

    // Initialize
    renderSidebar();
    loadProject(0);
    switchTab('live');
  </script>
</body>
</html>
