<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Wafi Dev Hub - A central portfolio showcasing construction calculators, Islamic inheritance tools, and web demos. Browse documentation and live apps.">
  <meta name="theme-color" content="#635bff">
  <title>Wafi Dev Hub</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --accent: #635bff;
      --accent-hover: #7c73ff;
      --accent-light: #eef2ff;
      --text-primary: #0a2540;
      --text-secondary: #425466;
      --text-tertiary: #697386;
      --bg-primary: #ffffff;
      --bg-secondary: #f6f8fa;
      --bg-sidebar: #f6f8fa;
      --border-color: #e3e8ee;
      --code-bg: #f6f8fa;
      --shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
      --font-sans: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      --font-mono: 'SF Mono', 'Fira Code', 'Fira Mono', Menlo, Consolas, monospace;
      --transition: 0.2s ease;
      --sidebar-width: 250px;
      --topnav-height: 64px;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      height: 100%;
      font-family: var(--font-sans);
      color: var(--text-primary);
      background: var(--bg-primary);
      overflow: hidden;
    }

    .app-container {
      display: flex;
      height: 100vh;
      width: 100%;
    }

    .topnav {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      height: var(--topnav-height);
      background: var(--bg-primary);
      border-bottom: 1px solid var(--border-color);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 32px;
      z-index: 1001;
    }

    .topnav-logo {
      display: flex;
      align-items: center;
      gap: 12px;
      text-decoration: none;
    }

    .topnav-logo .site-name {
      font-size: 1.1rem;
      font-weight: 700;
      color: var(--text-primary);
      letter-spacing: -0.01em;
    }

    .topnav .logo-img {
      height: 40px;
      width: auto;
      display: block;
    }

    .topnav-logo::before {
      display: none;
    }

    .topnav-links {
      display: flex;
      gap: 24px;
      align-items: center;
    }

    .topnav-links a {
      color: var(--text-secondary);
      text-decoration: none;
      font-size: 0.9rem;
      font-weight: 500;
      transition: color var(--transition);
    }

    .topnav-links a:hover {
      color: var(--accent);
    }

    .topnav-links .cta-btn {
      background: var(--accent);
      color: #fff;
      padding: 8px 16px;
      border-radius: 6px;
      font-weight: 600;
      font-size: 0.85rem;
    }

    .topnav-links .cta-btn:hover {
      background: var(--accent-hover);
      color: #fff;
    }

    .sidebar {
      width: var(--sidebar-width);
      background: var(--bg-sidebar);
      color: var(--text-primary);
      display: flex;
      flex-direction: column;
      position: fixed;
      top: var(--topnav-height);
      left: 0;
      height: calc(100vh - var(--topnav-height));
      z-index: 1000;
      transition: transform var(--transition);
      border-right: 1px solid var(--border-color);
      overflow-y: auto;
    }

    .sidebar-nav {
      flex: 1;
      padding: 20px 16px;
    }

    .nav-section {
      margin-bottom: 8px;
    }

    .nav-section-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      width: 100%;
      padding: 8px 12px;
      background: none;
      border: none;
      color: var(--text-primary);
      font-size: 0.8rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      cursor: pointer;
      transition: color var(--transition);
      font-family: var(--font-sans);
      border-radius: 6px;
    }

    .nav-section-header:hover {
      color: var(--accent);
    }

    .nav-section-header .chevron {
      transition: transform var(--transition);
      font-size: 0.7rem;
    }

    .nav-section.open .nav-section-header .chevron {
      transform: rotate(180deg);
    }

    .nav-section-items {
      display: none;
      padding-left: 12px;
      margin-top: 4px;
    }

    .nav-section.open .nav-section-items {
      display: block;
    }

    .nav-item {
      display: block;
      width: 100%;
      padding: 8px 12px;
      text-align: left;
      background: none;
      border: none;
      color: var(--text-secondary);
      font-size: 0.9rem;
      cursor: pointer;
      transition: all var(--transition);
      border-radius: 6px;
      font-family: var(--font-sans);
      text-decoration: none;
    }

    .nav-item:hover {
      background: var(--bg-primary);
      color: var(--text-primary);
    }

    .nav-item.active {
      background: var(--bg-primary);
      color: var(--accent);
      font-weight: 600;
      box-shadow: 0 1px 2px rgba(0,0,0,0.04);
    }

    .sidebar-footer {
      padding: 16px;
      border-top: 1px solid var(--border-color);
      font-size: 0.85rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
    }

    .sidebar-footer .theme-toggle {
      width: 100%;
    }

    .coffee-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      width: 100%;
      padding: 12px 16px;
      background: linear-gradient(135deg, lab(41.44% 75.44 -69.6) 0%, #bd76de 100%);
      color: #3e2723;
      text-decoration: none;
      border-radius: 10px;
      font-weight: 700;
      font-size: 0.9rem;
      font-family: var(--font-sans);
      box-shadow: 0 2px 8px rgba(255, 153, 51, 0.3);
      transition: all var(--transition);
      border: none;
      cursor: pointer;
    }

    .coffee-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 4px 16px rgba(255, 153, 51, 0.4);
      color: #3e2723;
      text-decoration: none;
    }

    .coffee-btn svg {
      width: 20px;
      height: 20px;
      flex-shrink: 0;
    }

    .main-content {
      margin-left: var(--sidebar-width);
      margin-top: var(--topnav-height);
      flex: 1;
      display: flex;
      flex-direction: column;
      height: calc(100vh - var(--topnav-height));
      overflow: hidden;
      background: var(--bg-primary);
    }

    .mobile-header {
      display: none;
      padding: 16px 20px;
      border-bottom: 1px solid var(--border-color);
      align-items: center;
      justify-content: space-between;
      background: var(--bg-primary);
    }

    .mobile-header h2 {
      font-size: 1.1rem;
      font-weight: 600;
    }

    .hamburger {
      background: none;
      border: none;
      font-size: 1.5rem;
      cursor: pointer;
      color: var(--text-primary);
      padding: 4px;
      line-height: 1;
    }

    .theme-toggle {
      background: var(--bg-primary);
      border: 1px solid var(--border-color);
      font-size: 0.85rem;
      cursor: pointer;
      color: var(--text-secondary);
      padding: 6px 12px;
      border-radius: 6px;
      transition: all var(--transition);
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      font-family: var(--font-sans);
      font-weight: 500;
      margin-top: 8px;
    }

    .theme-toggle:hover {
      border-color: var(--accent);
      color: var(--accent);
    }

    .tab-bar {
      display: flex;
      border-bottom: 1px solid var(--border-color);
      background: var(--bg-primary);
      padding: 0 32px;
      gap: 4px;
    }

    .tab-bar.hidden {
      display: none;
    }

    .tab-btn {
      padding: 16px 20px;
      background: none;
      border: none;
      border-bottom: 2px solid transparent;
      font-size: 0.95rem;
      font-weight: 500;
      color: var(--text-secondary);
      cursor: pointer;
      transition: all var(--transition);
      position: relative;
      top: 1px;
      font-family: var(--font-sans);
    }

    .tab-btn:hover {
      color: var(--text-primary);
    }

    .tab-btn.active {
      color: var(--accent);
      border-bottom-color: var(--accent);
      font-weight: 600;
    }

    .content-area {
      flex: 1;
      overflow-y: auto;
      padding: 40px;
      max-width: 100%;
      display: flex;
      flex-direction: column;
    }

    .content-panel {
      display: none;
      animation: fadeIn 0.3s ease;
      flex: 1;
      display: none;
      flex-direction: column;
      min-height: 0;
    }

    .content-panel.active {
      display: flex;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(4px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .home-hero {
      margin-bottom: 48px;
      max-width: 720px;
    }

    .home-hero h2 {
      font-size: 2.5rem;
      font-weight: 800;
      margin-bottom: 16px;
      letter-spacing: -0.04em;
      line-height: 1.1;
    }

    .home-hero p {
      color: var(--text-secondary);
      font-size: 1.15rem;
      line-height: 1.7;
      max-width: 600px;
    }

    .home-cta {
      margin-top: 24px;
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }

    .btn-primary {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: var(--accent);
      color: #fff;
      padding: 12px 24px;
      border-radius: 8px;
      text-decoration: none;
      font-weight: 600;
      font-size: 0.95rem;
      transition: all var(--transition);
      border: none;
      cursor: pointer;
    }

    .btn-primary:hover {
      background: var(--accent-hover);
      transform: translateY(-1px);
      box-shadow: 0 4px 12px rgba(99, 91, 255, 0.25);
    }

    .btn-secondary {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: var(--bg-primary);
      color: var(--text-primary);
      padding: 12px 24px;
      border-radius: 8px;
      text-decoration: none;
      font-weight: 600;
      font-size: 0.95rem;
      border: 1px solid var(--border-color);
      transition: all var(--transition);
      cursor: pointer;
    }

    .btn-secondary:hover {
      border-color: var(--accent);
      color: var(--accent);
    }

    .projects-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 24px;
    }

    .project-card {
      background: var(--bg-primary);
      border: 1px solid var(--border-color);
      border-radius: 12px;
      padding: 28px;
      cursor: pointer;
      transition: all var(--transition);
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .project-card:hover {
      transform: translateY(-3px);
      box-shadow: var(--shadow);
      border-color: var(--accent);
    }

    .project-card h3 {
      font-size: 1.15rem;
      font-weight: 700;
      margin: 0;
      color: var(--text-primary);
    }

    .project-card p {
      color: var(--text-secondary);
      font-size: 0.95rem;
      line-height: 1.6;
      margin: 0;
      flex: 1;
    }

    .project-card .card-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 4px;
    }

    .project-card .tag {
      padding: 4px 10px;
      border-radius: 4px;
      font-size: 0.78rem;
      font-weight: 500;
      background: var(--bg-secondary);
      color: var(--text-secondary);
      font-family: var(--font-mono);
    }

    .doc-header {
      margin-bottom: 32px;
      max-width: 720px;
    }

    .doc-header h2 {
      font-size: 2rem;
      font-weight: 700;
      margin-bottom: 8px;
      letter-spacing: -0.03em;
    }

    .doc-header p {
      color: var(--text-secondary);
      font-size: 1.05rem;
      line-height: 1.7;
    }

    .doc-section {
      margin-bottom: 32px;
      max-width: 720px;
    }

    .doc-section h3 {
      font-size: 1.25rem;
      font-weight: 600;
      margin-bottom: 12px;
      padding-bottom: 8px;
      border-bottom: 1px solid var(--border-color);
      color: var(--text-primary);
    }

    .doc-section p, .doc-section li {
      line-height: 1.7;
      color: var(--text-secondary);
      margin-bottom: 8px;
    }

    .doc-section ul {
      margin-left: 24px;
      margin-bottom: 16px;
    }

    .doc-section li {
      margin-bottom: 6px;
    }

    .tag {
      display: inline-block;
      padding: 4px 10px;
      border-radius: 4px;
      font-size: 0.8rem;
      font-weight: 500;
      background: var(--bg-secondary);
      color: var(--text-secondary);
      margin-right: 6px;
      margin-bottom: 6px;
      font-family: var(--font-mono);
    }

    .formula-box {
      background: var(--code-bg);
      border: 1px solid var(--border-color);
      border-radius: 8px;
      padding: 16px 20px;
      font-family: var(--font-mono);
      font-size: 0.9rem;
      overflow-x: auto;
      margin: 12px 0;
      color: var(--text-secondary);
    }

    .iframe-container {
      flex: 1;
      min-height: 0;
      border: 1px solid var(--border-color);
      border-radius: 8px;
      overflow: hidden;
      background: var(--bg-secondary);
    }

    .iframe-container iframe {
      width: 100%;
      height: 100%;
      border: none;
    }

    .iframe-placeholder {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      color: var(--text-secondary);
      text-align: center;
      padding: 40px;
    }

    .iframe-placeholder svg {
      width: 64px;
      height: 64px;
      margin-bottom: 16px;
      opacity: 0.4;
    }

    .overlay {
      display: none;
      position: fixed;
      top: var(--topnav-height);
      left: 0;
      width: 100%;
      height: calc(100vh - var(--topnav-height));
      background: rgba(0, 0, 0, 0.3);
      z-index: 999;
      backdrop-filter: blur(2px);
    }

    .overlay.open {
      display: block;
    }

    [data-theme="dark"] {
      --text-primary: #e6e6e6;
      --text-secondary: #a0aec0;
      --text-tertiary: #718096;
      --bg-primary: #0a2540;
      --bg-secondary: #111b2d;
      --bg-sidebar: #0f1a2e;
      --border-color: #1e2d3d;
      --code-bg: #0f1a2e;
    }

    [data-theme="dark"] .topnav {
      background: var(--bg-primary);
      border-bottom-color: var(--border-color);
    }

    [data-theme="dark"] .project-card {
      background: var(--bg-primary);
      border-color: var(--border-color);
    }

    [data-theme="dark"] .project-card:hover {
      border-color: var(--accent);
    }

    [data-theme="dark"] .formula-box {
      background: var(--code-bg);
      border-color: var(--border-color);
    }

    [data-theme="dark"] .doc-section h3 {
      border-bottom-color: var(--border-color);
    }

    [data-theme="dark"] .iframe-container {
      background: var(--bg-secondary);
      border-color: var(--border-color);
    }

    [data-theme="dark"] .nav-item:hover {
      background: var(--bg-primary);
    }

    [data-theme="dark"] .nav-item.active {
      background: var(--bg-primary);
      box-shadow: 0 1px 2px rgba(0,0,0,0.2);
    }

    [data-theme="dark"] .theme-toggle {
      background: var(--bg-primary);
      border-color: var(--border-color);
    }

    [data-theme="dark"] .coffee-btn {
      color: #3e2723;
    }

    @media (max-width: 768px) {
      .sidebar {
        transform: translateX(-100%);
        width: 280px;
        top: var(--topnav-height);
        height: calc(100vh - var(--topnav-height));
        box-shadow: 4px 0 12px rgba(0, 0, 0, 0.15);
      }

      .sidebar.open {
        transform: translateX(0);
      }

      .main-content {
        margin-left: 0;
      }

      .mobile-header {
        display: flex;
      }

      .topnav {
        display: none;
      }

      .content-area {
        padding: 24px 20px;
      }

      .tab-bar {
        padding: 0 16px;
      }

      .tab-btn {
        padding: 14px 14px;
        font-size: 0.9rem;
      }

      .iframe-container {
        flex: 1;
        min-height: 0;
      }

      .home-hero h2 {
        font-size: 1.8rem;
      }

      .projects-grid {
        grid-template-columns: 1fr;
      }

      .home-cta {
        flex-direction: column;
      }
    }

    @media (min-width: 769px) {
      .sidebar {
        transform: translateX(0) !important;
      }
    }

    ::-webkit-scrollbar {
      width: 8px;
      height: 8px;
    }

    ::-webkit-scrollbar-track {
      background: transparent;
    }

    ::-webkit-scrollbar-thumb {
      background: rgba(0, 0, 0, 0.15);
      border-radius: 4px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: rgba(0, 0, 0, 0.25);
    }

    .sidebar::-webkit-scrollbar-thumb {
      background: rgba(0, 0, 0, 0.1);
    }

    .sidebar::-webkit-scrollbar-thumb:hover {
      background: rgba(0, 0, 0, 0.15);
    }
  </style>
</head>
<body>
  <div class="app-container">
    <div class="overlay" id="overlay"></div>

    <nav class="topnav" id="topnav">
      <a href="#" class="topnav-logo" onclick="loadHome(); return false;">
        <img src="universal.png" alt="Universal Logo" class="logo-img">
        <img src="Ns.png" alt="WAFI Dev Hub Logo" class="logo-img">
        <span class="site-name">WAFI Dev Hub</span>
      </a>
      <div class="topnav-links">
        <a href="https://github.com/Aspiral25/BuildingHouseCalculator" target="_blank" rel="noopener noreferrer" class="cta-btn">GitHub</a>
      </div>
    </nav>

    <aside class="sidebar" id="sidebar">
      <nav class="sidebar-nav" id="sidebarNav"></nav>
      <div class="sidebar-footer">
        <button class="theme-toggle" id="themeToggle" aria-label="Toggle theme">🌙 Dark</button>
        <a href="https://ko-fi.com/nsdotmy" target="_blank" rel="noopener noreferrer" class="coffee-btn">
          <svg viewBox="0 0 24 24" fill="currentColor" xmlns="http://www.w3.org/2000/svg">
            <path d="M2 21h18v-2H2v2zM20 8h-2V5H2v10c0 2.21 1.79 4 4 4h10c2.21 0 4-1.79 4-4V8zm-2 7c0 1.1-.9 2-2 2H6c-1.1 0-2-.9-2-2V5h14v10zm-3-3h-2v-2h2v2z"/>
          </svg>
          Buy me a coffee
        </a>
      </div>
    </aside>

    <main class="main-content">
      <div class="mobile-header">
        <h2 id="mobileTitle">WAFI Dev Hub</h2>
        <button class="hamburger" id="hamburger" aria-label="Toggle menu">☰</button>
      </div>

      <div class="tab-bar hidden" id="tabBar">
        <button class="tab-btn active" data-tab="docs">Documentation</button>
        <button class="tab-btn" data-tab="live">Live App</button>
      </div>

      <div class="content-area" id="contentArea">
        <div class="content-panel active" id="docsPanel"></div>
        <div class="content-panel" id="livePanel">
          <div class="iframe-container" id="iframeContainer"></div>
        </div>
      </div>
    </main>
  </div>

  <script>
    const projects = [
      {
        id: 'construction-calculator',
        label: 'Construction Calculator',
        section: 'Web Project',
        docs: {
          title: 'Construction Material Calculator',
          description: 'A web and desktop tool to estimate construction materials for walls, flooring, concrete, and paint. Built for Malaysian contractors, builders, and DIY enthusiasts.',
          techStack: ['HTML5', 'CSS3', 'JavaScript', 'Python', 'PyQt6'],
          features: [
            'Wall Material Calculator - Estimates bricks, cement, and sand for wall construction and plastering',
            'Floor Tile Calculator - Calculates tile counts (1ft and 2ft), mortar, and adhesive requirements',
            'Concrete Calculator - Provides volume, ready-mix cost, and manual mix breakdown (cement bags, sand, aggregate, BRC)',
            'Paint Calculator - Computes surface area, sealer/primer, and paint litres based on brand coverage rates'
          ],
          formulas: [
            'Cement bulk density: 1440 kg/m³ (50 kg bags → 28.8 bags/m³)',
            'Sand conversion: 1 ela = 1.308 m³',
            'Brick face area: 0.22m × 0.07m (Standard Malaysian brick 230×70×100mm)',
            'Mortar thickness: 30mm, mix ratio 1:4 (cement:sand)',
            'Plaster thickness: 19mm, mix ratio 1:4',
            'Concrete mix ratio: 1:2:2 (cement:sand:aggregate)',
            'BRC sheet size: 2.2m × 6m (A6 JKR Spec reinforcing mesh)'
          ],
          notes: 'The web version is a single-file application with no build step or dependencies. The legacy desktop version uses PyQt6 with QFormLayout and QButtonGroup for exclusive paint brand selection. The app supports bilingual interface (Malay/English) with localStorage persistence.'
        },
        iframeSrc: 'calculator.html',
        hasIframe: true
      },
      {
        id: 'faraid-calculator',
        label: 'Faraid Calculator',
        section: 'Web Project',
        docs: {
          title: 'Faraid Calculator',
          description: 'An accurate and Syariah-compliant Islamic inheritance calculator. Enter estate details and heirs to get exact distribution breakdown with fraction-precision mathematics.',
          techStack: ['HTML5', 'CSS3', 'JavaScript', 'Fraction.js'],
          features: [
            'Estate net calculation after funeral expenses and debts',
            'Fixed-share heirs: Wife (1/8 with children, 1/4 without), Mother (1/6 with children, 1/3 without)',
            'Residuary (Asabah) distribution for children with 2:1 son-to-daughter ratio',
            'Visual tree breakdown showing each heir\'s fraction and exact RM value'
          ],
          formulas: [
            'Net Estate = Gross Estate - Funeral Expenses - Debts',
            'Wife: 1/8 (with children) or 1/4 (without children)',
            'Mother: 1/6 (with children) or 1/3 (without children)',
            'Father: 1/6 (with children) - simplified fixed share',
            'Children share remainder by 2:1 ratio (son : daughter)'
          ],
          notes: 'Uses Fraction.js for exact Islamic mathematics without floating-point rounding errors. This is a simplified demo version; consult a qualified Syariah practitioner for real-world estate distribution.'
        },
        iframeSrc: 'faraid.html',

      {
        id: 'erp-training-guide',
        label: 'ERP Guide',
        section: 'Notes',
        docs: {
          title: 'ERP System Training Notes',
          description: 'Detailed Q&A and workflow procedures for the Monitor G5 ERP system.',
          techStack: [],
          features: [],
          formulas: [],
          notes: `
            <div class="erp-notes" style="margin-top: 16px;">
              
              <h3 style="color: var(--text-primary); border-bottom: 1px solid var(--border-color); padding-bottom: 8px; margin-top: 24px;">// ERP User Flows</h3>
              
              <h4 style="margin-top: 16px; margin-bottom: 8px;">[Sheryl / Sales & CS]</h4>
              <ol style="margin-left: 20px; margin-bottom: 16px; color: var(--text-secondary); line-height: 1.6;">
                <li><strong>Create Quotation:</strong> Go to ERP > Register Quote.</li>
                <li><strong>Create PO/SO:</strong> Normally, if a quotation is accepted by the customer, convert the Quotation to an SO. If you want to create an SO manually: Go to ERP > Register Customer > Header: Set related settings and input > Rows: Choose Row Type 1. The part needs to be a Finished Good (FGS). If there is no FGS (e.g., a new tester), you need to register new parts in Part Register. If it is a repeat order, just choose the FGS from the list. (Leave the Order Number blank; the system will auto-generate the latest running number).</li>
                <li><strong>Create Finished Good Number:</strong> Go to ERP > Part Register > Click Create New+ > Choose the latest FGS running number + 1 > Set related settings/inputs > Stock tab: Set location to Finished Good Loc > Save.</li>
              </ol>

              <h4 style="margin-top: 16px; margin-bottom: 8px;">[Albert / Design EE]</h4>
              <ol style="margin-left: 20px; margin-bottom: 16px; color: var(--text-secondary); line-height: 1.6;">
                <li><strong>Create Engineering BOM for Semi-Finished Goods (IFG0, IFG1, SUB-C, etc.):</strong> This assumes that all component-level parts are already imported. Semi-finished goods will link all components using ERP > BOM and Routing.</li>
              </ol>

              <h4 style="margin-top: 16px; margin-bottom: 8px;">[Cheah / Manufacturing EE]</h4>
              <ol style="margin-left: 20px; margin-bottom: 16px; color: var(--text-secondary); line-height: 1.6;">
                <li>Check the BOM and routing to verify the goods. Make sure everything is correct before creating an MO.</li>
                <li>Create a Manufacturing Order (MO). Link the part/semi-finished good and PO to trigger the Purchase Order (PO) for the parts. Note: The PO suggestion is actually created during BOM routing.</li>
                <li value="4"><strong>Ms. How (Electrical):</strong> Look up part selection and create a PO for the parts required to fulfill the MO.</li>
                <li><strong>Mechanical:</strong> Look up part selection.</li>
                <li><strong>CP:</strong> Obtain management approval for the part purchase PO.</li>
                <li>Parts received from the supplier go to the Store or Incoming QC for Part Delivery Reporting.</li>
                <li>EE & Mech Manufacturing will issue a Picklist to collect the items from the store and start operations. Once finished, report on the finished product.</li>
              </ol>

              <h4 style="margin-top: 16px; margin-bottom: 8px;">[Zhong]</h4>
              <ol style="margin-left: 20px; margin-bottom: 16px; color: var(--text-secondary); line-height: 1.6;">
                <li><strong>Report Delivery:</strong> Load the SO > Row tab > On the right-hand side under the Location section, update the reporting value.</li>
              </ol>

              <h4 style="margin-top: 16px; margin-bottom: 8px;">// Additional Mechanical Flow</h4>
              <ol style="margin-left: 20px; margin-bottom: 24px; color: var(--text-secondary); line-height: 1.6;">
                <li>The Mechanical Designer designs the part with a specific part number > Import the part using Excel > Import the BOM to create a module with all those parts. Next, link the drawings to all single fabrication parts. Then SAVE the BOM.</li>
                <li>Mechanical Manufacturing defines the operations for all modules created by the Designer.</li>
                <li>Mechanical Manufacturing creates an MO for M01 modules. Go to Manufacturing > Register Manufacturing Order > Under the Orders section, click the add symbol > Input the part number of the M01 part > Save.</li>
                <li>The Mechanical Designer links the M00 to FGSxxx using BOM Routing > Load the FGS > Navigate to the top main FGS > Add the M00 material to the FGS > Define the operation for the FGS (this should be Integration M00 & IFG0).</li>
              </ol>


              <h3 style="color: var(--text-primary); border-bottom: 1px solid var(--border-color); padding-bottom: 8px; margin-top: 32px;">// Sales</h3>
              <div style="color: var(--text-secondary); margin-bottom: 24px;">
                <p style="margin-bottom: 12px; line-height: 1.6;"><strong>[How to link PO/SO to Quotation]</strong><br>Once a quotation (QUO) is created and sent to the customer, and the customer accepts it, the QUO can be converted to an SO using the Customer Order function in Quote.</p>
                <p style="margin-bottom: 12px; line-height: 1.6;"><strong>[Quote same quotation item to different customer]</strong><br>Open the Quotation > Save As first > Load the new Quotation > Change the customer details in the customer section.</p>
                <p style="margin-bottom: 12px; line-height: 1.6;"><strong>[Attach Calibration Cert for FGSxxx given that it has a batch number]</strong><br>Go to Stock > Traceability > Serial Number/Batch > On the General tab under Information, the certificate can be attached.</p>
                <p style="margin-bottom: 12px; line-height: 1.6;"><strong>[Warranty for Machine]</strong><br>Go to Stock > Traceability > Serial Number/Batch > Warranty.</p>
                <p style="margin-bottom: 12px; line-height: 1.6;"><strong>[2 SO under 1 delivery DO]</strong><br>Go to Customer Register > Load the customer > Settings tab > Delivery/Shipping > Apply comprehensive delivery note.</p>
                <p style="margin-bottom: 12px; line-height: 1.6;"><strong>[How much sales already done for the same customer]</strong><br>Use the selection and filter tools in sorting.</p>
                <p style="margin-bottom: 12px; line-height: 1.6;"><strong>[How to handle on-loan item to customer but want to record in system]</strong><br>Create an order type > Create an on-loan type > Set price = 0 > Do report delivery when sending to the customer.<br>During SO creation, use Row Type 1 to deduct stock. If the customer decides to purchase it, use Row Type 2 to record the value for finance tracking.</p>
                <p style="margin-bottom: 12px; line-height: 1.6;"><strong>[If for On-loan, it is not converted to purchase, and the part is returned]</strong><br>Register case > Case type = Customer Nonconformity > Initial delivery = Choose the SO > Choose Cause Code > A case is now created.<br>Then go to Direct Stock Reporting > Add Arrival.</p>
                <p style="margin-bottom: 12px; line-height: 1.6;"><strong>[Return/reject PO item which already report receiving]</strong><br>Register case > Choose PO from initial PO > Register the case > Go to Report Arrival > On the right side, report the returned quantity > Direct Stock Reporting to deduct stock.</p>
                <p style="margin-bottom: 12px; line-height: 1.6;"><strong>[What if the returned item came back?]</strong><br>Option 1: Create a new PO just to report the arrival.<br>Option 2: Create a case for the returning item > Direct Stock Reporting to add stock.</p>
                <p style="margin-bottom: 12px; line-height: 1.6;"><strong>[Blanket order]</strong><br>1 PO from the customer = 1 Blanket order. Inside the list, determine how many systems are in a row (e.g., each row = 12) > Adjust the requirement date.</p>
                <p style="margin-bottom: 12px; line-height: 1.6;"><strong>[Blanket order sales only service]</strong><br>Option 1: Order type = Blanket order sales, Part type = Manufactured > Number series = Blanket order number > Register blanket order > Register customer order = Find the blanket order column > Report delivery (if just a service) > Get DO.<br>Option 2: Create 12 rows in the blanket order row. Then adjust the 'Valid To' date.</p>
                <p style="margin-bottom: 12px; line-height: 1.6;"><strong>[Blanket order sales service + part]</strong><br>Register a blanket order (e.g., 12 job qty) > Every month, create an SO > Register an MO if parts are required > Report delivery.<br>Monitor this blanket order in the Blanket Order List > Under this blanket order number, you can find the related SOs.</p>
                <p style="margin-bottom: 12px; line-height: 1.6;"><strong>[How to close blanket order]</strong><br>Option 1: Register blanket order > Change status to 9-Historical.<br>Option 2: Change the 'Valid To' date, or wait for the date to pass naturally.</p>
                <p style="margin-bottom: 12px; line-height: 1.6;"><strong>[QAV order same amount invoice every month]</strong><br>We have an option to use an Agreement Order. This will post the invoice monthly based on the settings.</p>
                <p style="margin-bottom: 12px; line-height: 1.6;"><strong>[How to undo SO part delivery report]</strong><br>Go to Delivery > Undo Delivery Order.<br>Note: The DO part number is consumed. If you report it again, it will use a new DO running number.</p>
              </div>


              <h3 style="color: var(--text-primary); border-bottom: 1px solid var(--border-color); padding-bottom: 8px; margin-top: 32px;">// Manufacturing</h3>
              <div style="color: var(--text-secondary); margin-bottom: 24px;">
                <p style="margin-bottom: 12px; line-height: 1.6;"><strong>[How to cancel MO]</strong><br>Open Report Manufacturing Order > Load the MO > At the operation level, set the remaining qty to 0 > For material, also set the qty to 0.</p>
                <p style="margin-bottom: 12px; line-height: 1.6;"><strong>[Pre-Calculation & Post Calculation]</strong><br>Pre-calculation can be run to view if the price is on the higher or lower side compared to the quoted price.<br>Post-calculation can be done for the MO to see if the actual manufacturing cost aligns with the planned cost. Saving the post-calculation will change the MO status to Post-Calculation.</p>
                <p style="margin-bottom: 12px; line-height: 1.6;"><strong>[Subcontract Operation]</strong><br>1. The supplier needs to be registered as a Subcontractor.<br>2. The work center needs to be updated with the subcontract supplier and other related settings.<br>3. In the MO, you must define the Operation unit time, or change the unit to MYR and set the value to 1.</p>
                <p style="margin-bottom: 12px; line-height: 1.6;"><strong>[Subcontract PCB with MOQ]</strong><br>1. Create a manual MO for this subcontract project.<br>2. Perform a pre-calculation to calculate the manufacturing cost. Then, save the manufacturing cost to the Standard Price (Add to Selection > Saving > Save section, List > Tick Save Price > Save). Check the Part Register to ensure the Standard Price is updated.<br>3. Go to Pre-calculation and run it for the complete PCB part (main part).<br>4. Go to Manufacturing > Subcontract > Subcontract Documents/Shipped > Input the part number > Printout = PO and Delivery note.<br>5. Report arrival once received from the supplier. Once the arrival report is done, the MO will automatically be reported.<br>6. This part will be linked into the material of the Link-requirement MO. The cost will be the standard price per piece × qty.</p>
                <p style="margin-bottom: 12px; line-height: 1.6;"><strong>[MO Costing-Operation]</strong><br>Setup time = The time taken before starting the job (setup cost will be divided by the main part quantity).<br>Unit time = The actual time used for the operation.</p>
                <p style="margin-bottom: 12px; line-height: 1.6;"><strong>[Final Reporting]</strong><br>This is the final step, best done to lock the MO after the part is delivered and the invoice is issued.<br>Final reporting will show if there is any abnormal status on the reported finished MO. This allows us to clear any issues before reporting as Final and changing the status to Historical.<br>After Final Reporting, we can run a Post-Calculation and update the standard price.</p>
                <p style="margin-bottom: 12px; line-height: 1.6;"><strong>[Issue part after SO is shipped and MO reported]</strong><br>1. Add the material inside the MO.<br>2. Generate a Picklist.<br>3. Purchase part: Go to Requirement Calculation > Load with part selection > Apply order suggestion > Generate PO > Report arrival.<br>4. Store/IQC needs to report the picklist.</p>
              </div>


              <h3 style="color: var(--text-primary); border-bottom: 1px solid var(--border-color); padding-bottom: 8px; margin-top: 32px;">// Purchaser</h3>
              <div style="color: var(--text-secondary); margin-bottom: 24px;">
                <p style="margin-bottom: 12px; line-height: 1.6;"><strong>[How To Delete PO]</strong><br>Users with PO access can delete "Approved" POs using the Order Receive function. Register PO > Load PO number > Click the Link symbol button on the top ribbon > Select Report Arrival > Select Selection tab > Scroll down to the bottom section > Set the suggested quantity for the material row to ZERO > Reload the PO > In the received section, ensure the value is zero, tick delete, then Save > Reload the PO > Ensure the status has changed to 9-Final Delivery Made.</p>
                <p style="margin-bottom: 12px; line-height: 1.6;"><strong>[Where to view previously cancelled PO]</strong><br>Purchase > Arrival Log.</p>
                <p style="margin-bottom: 12px; line-height: 1.6;"><strong>[How to change delivery date for PO if the supplier didn't commit on delivery date]</strong><br>Even when a PO is approved, if there is a change in the date, the Purchaser can change the delivery date on the Order List - Purchase > Load the PO > List > Click the 'updatable' symbol, and the delivery date can now be changed.</p>
                <p style="margin-bottom: 12px; line-height: 1.6;"><strong>[How to purchase a part with abnormal flow not following MO]</strong><br>Use the PR website.</p>
                <p style="margin-bottom: 12px; line-height: 1.6;"><strong>[How to requote]</strong><br>Use Related Quotes and create a new one. Choose the correct one to convert to an SO.</p>
                <p style="margin-bottom: 12px; line-height: 1.6;"><strong>[Using phrases to ease document editing]</strong><br>Save phrases for future repeated use throughout all documents.</p>
                <p style="margin-bottom: 12px; line-height: 1.6;"><strong>[Reject a PO with comment]</strong><br>Comments will go to the Additional Info section.</p>
                <p style="margin-bottom: 12px; line-height: 1.6;"><strong>[Delivery date tracking]</strong><br>The Manufacturing side can always see the actual delivery date if the Purchaser updates it.</p>
                <p style="margin-bottom: 12px; line-height: 1.6;"><strong>[Approval]</strong><br>If any amendments are made, resending for approval will only trigger if the setting at General Approval Setting > Resend Settings tab is configured correctly.</p>
                <p style="margin-bottom: 12px; line-height: 1.6;"><strong>[If there is no SO and no MO, but want to purchase item, then the item arrive at store]</strong><br>Use Stock > Direct Stock Reporting > Choose either withdrawal or arrival.</p>
                <p style="margin-bottom: 12px; line-height: 1.6;"><strong>[If there is SO but still want to issue extra part for example resistor for repair]</strong><br>Use Direct Stock Reporting and indicate the SO in the specific column.</p>
                <p style="margin-bottom: 12px; line-height: 1.6;"><strong>[If user want to receive notification on the raised PR part purchased]</strong><br>Go to Part Register > Planning Window > Select the part > On the left icon, choose the CCTV icon (Create manufacturing task) > Arrival.</p>
                <p style="margin-bottom: 12px; line-height: 1.6;"><strong>[Subcontract]</strong><br>If a part needs to be sent for subcontracting (e.g., PCB SMT): In Part Register (e.g., IFG0) > Material will be divided into two (material sent to subcon and material assembled in-house). Operations also need to be set up as two operations (Subcon and In-house assembly).<br>Create an MO to build the PCB > Go to Manufacturing > Subcontract Document Shipped > In selection, input the MO number and load.</p>
                <p style="margin-bottom: 12px; line-height: 1.6;"><strong>[What if PO is rejected by management]</strong><br>When a PO is rejected, the status will become DENIED. Change the supplier, quantity, or price as needed, then resubmit the PO for approval.</p>
                <p style="margin-bottom: 12px; line-height: 1.6;"><strong>[Another way similar to PO suggestion but much better with view of planning window]</strong><br>Use Requirement Calculation. First, go to PO Suggestion with the default value of EE suggestion or ME suggestion > Load > Copy the part to the clipboard using the small icon on the left > Open Requirement Calculation > Under Selection, at Part, tick the clipboard box > Load. From here, you can see all related parts in the PO suggestion with more info. At the bottom, you can use the Planning Window to view requirements and click Apply PO to create a PO directly.</p>
              </div>


              <h3 style="color: var(--text-primary); border-bottom: 1px solid var(--border-color); padding-bottom: 8px; margin-top: 32px;">// Store</h3>
              <div style="color: var(--text-secondary); margin-bottom: 24px;">
                <p style="margin-bottom: 12px; line-height: 1.6;"><strong>[How to issue extra parts without reporting or using a pick list]</strong><br>(e.g., taking 100 first, using 50, and returning 50). Use Direct Part Reporting.</p>
                <p style="margin-bottom: 12px; line-height: 1.6;"><strong>[If M00 item has items from the store instead of Incoming QC Receiving, how to create a Picklist specific for items in store]</strong><br>In Part Register > Stock tab > Bottom section, find Traceability > Untick it for all electronic parts.</p>
                <p style="margin-bottom: 12px; line-height: 1.6;"><strong>[Stock Count]</strong><br>For monthly or yearly stock counts, use Stock Count in List:<br>1. Selection > List types > Create stock count basis. Settings > Stock count status > Stock count in progress with saved balance > Load > Include > Save. The system will create a stock count basis number.<br>2. Print out the stock count document for manual counting in the store. When complete, proceed to the next step.<br>3. Stock Count in List > List types > Manage stock count > Enter the stock count basis number or just load to view the list.<br>4. Open the stock count basis number to report > Select and load > Reporting tab > Report the balance qty.<br>5. You can also export the list to Excel and edit it there. If there is a part with a quantity that is not in the same location as the list, use the 'Add in line' button to add the same part with a different location.<br>6. Use Stock Count Differences to view the stock count summary report.</p>
              </div>


              <h3 style="color: var(--text-primary); border-bottom: 1px solid var(--border-color); padding-bottom: 8px; margin-top: 32px;">// Finance</h3>
              <div style="color: var(--text-secondary); margin-bottom: 24px;">
                <p style="margin-bottom: 12px; line-height: 1.6;"><strong>[Copy Latest purchased price to Standard Price]</strong><br>Go to Stock > Price Adjustment > List Type = Copy Price > Settings = Copy from (most recent purchased price), Copy to (Standard price).</p>
                <p style="margin-bottom: 12px; line-height: 1.6;"><strong>[Mark-up Calculation]</strong><br>1. Set Calculation Mark-up at Settings > Calculation Markup. This will pre-set the percentage of markup.<br>2. Markup can also be set at the Part Register level > Manufacturing, or under Pre/Post Calculation > Selection > Bottom section (Markup section).</p>
                <p style="margin-bottom: 12px; line-height: 1.6;"><strong>[Setting no 22 = Valuation method = FIFO price]</strong><br>If the setting is set to FIFO price, the system will capture the part price from the PO price.<br>If the part balance is adjusted using Balance Import, the system will not capture the price; instead, it will leave the part price as 0.<br>The correct method to have the system set the price is to use Direct Stock Reporting > Arrival. This way, if a quantity is adjusted in the balance stock, the system will automatically capture the price based on our settings (Settings > Stock > No. 22.1-22.3).</p>
                <p style="margin-bottom: 12px; line-height: 1.6;"><strong>[WIP Value]</strong><br>This will list all MOs currently in progress and detail all material values (in progress, reported, and planned).<br>It is also a good list to monitor work-in-progress and identify any old MOs that have not yet been closed.</p>
              </div>


              <h3 style="color: var(--text-primary); border-bottom: 1px solid var(--border-color); padding-bottom: 8px; margin-top: 32px;">// BOM Adaptation Website (http://10.11.60.225:8100/authentication/login)</h3>
              <div style="color: var(--text-secondary); margin-bottom: 24px; line-height: 1.6;">
                <p>BOMIMPORT1 12345 EE<br>BOMIMPORT2 12345 ME</p>
              </div>


              <h3 style="color: var(--text-primary); border-bottom: 1px solid var(--border-color); padding-bottom: 8px; margin-top: 32px;">// Engineering</h3>
              <div style="color: var(--text-secondary); margin-bottom: 24px;">
                <p style="margin-bottom: 12px; line-height: 1.6;"><strong>[What happen if Engineering add a new material into the BOM that already finish picked by store]</strong><br>The additional material should be added inside the BOM routing by Engineering.<br>The MO needs to be synchronized: Go to Orders > Synchronize BOM routing > Choose the part > Synchronize > Run. It will show the newly added items > Tick the items that have changes and SAVE.<br>Go to Register MO > Load the MO and verify if the new part has a sync logo beside it.<br>Go to Manufacturing > Planning > Picklist > Load MO > Generate the picklist (it should show the remaining items not yet picked).</p>
                <p style="margin-bottom: 12px; line-height: 1.6;"><strong>[Why SUB-C is set as Part type Fictitious]</strong><br>Sub-C is a grouping of purchased parts, not manufactured in-house. This part is grouped as Sub-C (or Sub-V). For example, if an SMU has the ERP part number IFG0, under this IFG0 there will be a few Sub-C groups of components. This makes it easier to adjust only a specific group of components for different sourcing outputs on the same SMU board.<br>Another option is using Quick Reporting; if there are no subcon operations inside the MO, you can use this to delete or cancel the MO.</p>
                <p style="margin-bottom: 12px; line-height: 1.6;"><strong>[How to deal with a part manufactured in house using 3D printer, then using the same part to manufacture by vendor?]</strong><br>Use the same M02 part template to add the part. Then, manually change the part to 'Manufactured' instead of 'Purchased'. When the part is ready for vendor manufacturing, change it back to 'Purchased'. Remember to add a remark for future reference. A 'Manufactured' part will not trigger a PO; it requires an MO and an operation.</p>
              </div>


              <h3 style="color: var(--text-primary); border-bottom: 1px solid var(--border-color); padding-bottom: 8px; margin-top: 32px;">// Design</h3>
              <div style="color: var(--text-secondary); margin-bottom: 24px;">
                <ol style="margin-left: 20px; line-height: 1.6;">
                  <li>Create a drawing with the part number and quantity.</li>
                  <li>Set it as either stock-driven or order-oriented.</li>
                  <li>When the MO is already created and changes are made to the BOM: Add the part first, then synchronize it with BOM and Routing.</li>
                </ol>
              </div>


              <h3 style="color: var(--text-primary); border-bottom: 1px solid var(--border-color); padding-bottom: 8px; margin-top: 32px;">// PR Website (http://10.11.60.225/home)</h3>
              <div style="color: var(--text-secondary); margin-bottom: 24px;">
                <p style="margin-bottom: 12px; line-height: 1.6;"><strong>[PR Flow]</strong><br>1. Any user can request a PR on the PR website.<br>2. The Approver selects the PR from the list, sets the Price, Supplier, Account, and Project, then clicks APPROVE.<br>3. The Approver goes back to the Header, scrolls down, ticks 'Part Purchase', and clicks Save.<br>4. The status will change to Approved.</p>
                <p style="margin-bottom: 12px; line-height: 1.6;"><strong>[Row Type]</strong><br>1. Part Row: A part already registered in G5.<br>2. Additional Order Row: A part that we do not want to register but still want to proceed with a PO.<br>4. A remark for the PR item or a note for the purchaser.</p>
                <p style="margin-bottom: 12px; line-height: 1.6;"><strong>[Date Setting and Format]</strong><br>The date format follows the user's PC settings.<br>Use T+1 to set the date to tomorrow.<br>Use M+1 to set the month to the 1st day of the next month.</p>
              </div>


              <h3 style="color: var(--text-primary); border-bottom: 1px solid var(--border-color); padding-bottom: 8px; margin-top: 32px;">// Admin</h3>
              <div style="color: var(--text-secondary); margin-bottom: 24px;">
                <p style="margin-bottom: 12px; line-height: 1.6;"><strong>[Updating system version]</strong><br>- Use the Monitor Installation Manager software.<br>- Open the manager and let it update itself automatically (leave it for 10+ mins).<br>- On the 'Installed Version' tab, you can view the G5 and other component versions.<br>- Download the update first before installing. Downloading won't affect user logins, but the installation process will log everyone out.</p>
                <p style="margin-bottom: 12px; line-height: 1.6;"><strong>[If the license suddenly gets an error]</strong><br>- Open the Monitor Installation Manager to let it reconnect to the Sweden server.</p>
                <p style="margin-bottom: 12px; line-height: 1.6;"><strong>[Task Manager services]</strong><br>- Monitor has 4 services + 1 SQL G5 service.<br>- Restart all services if the user client software cannot log in.</p>
                <p style="margin-bottom: 12px; line-height: 1.6;"><strong>[Uploading database]</strong><br>- Log in to the ERP, go to Database Administration > Uploading of database > Paste the URL link provided by the Monitor support team.<br>- Uploading the database will not affect active users.</p>
                <p style="margin-bottom: 12px; line-height: 1.6;"><strong>[Block all invoicing generated for finance]</strong><br>- Go to Order Types > Customer Order tab > Find 'Create Invoice Basis'. Unticking all options will stop the creation of invoice data.</p>
                <p style="margin-bottom: 12px; line-height: 1.6;"><strong>[Creating Agent task scheduler]</strong><br>1. Go to System Setting > System Overall > Complete the email settings and test.<br>2. Agent Task > Create an agent task > Find the procedure > Under the Settings section, choose the default values. Under the Communication section, set the document type and the receiver (via email).<br>3. On any page, you can create a default value.</p>
                <p style="margin-bottom: 12px; line-height: 1.6;"><strong>[If a signer is absent and wants to pass the approval to another signer]</strong><br>- Use Signer Settings > Absence.</p>
              </div>


              <h3 style="color: var(--text-primary); border-bottom: 1px solid var(--border-color); padding-bottom: 8px; margin-top: 32px;">// Project</h3>
              <div style="color: var(--text-secondary); margin-bottom: 24px;">
                <p style="margin-bottom: 12px; line-height: 1.6;"><strong>[P&L Income]</strong><br>- Derived from the SO.</p>
                <p style="margin-bottom: 12px; line-height: 1.6;"><strong>[PO item consolidate many project purchases into 1 order]</strong><br>- The purchaser needs to separate the purchase into multiple rows to ensure the purchase cost goes to the correct project.</p>
                <p style="margin-bottom: 12px; line-height: 1.6;"><strong>[Change setting for cost capture/calculation in a project]</strong><br>- Go to Basic Data - Project > Project Types > Costs column.</p>
                <p style="margin-bottom: 12px; line-height: 1.6;"><strong>[Pre-calculation & Post-Calculation]</strong><br>- The material price in this calculation always uses the available consumption stock based on the FIFO price.</p>
                <p style="margin-bottom: 12px; line-height: 1.6;"><strong>[How to exclude double cost in Project cost calculation]</strong><br>- By default, the purchased item cost is captured inside the Cost/Income at the Project level.<br>- To avoid double counting, configure the settings at Chart of Account > General > Dimensions > Project > Applied = Yes, C/I type = [Leave blank].<br>- With this setting, the PO cost will not be included in the Project calculation once the PO is converted into an invoice.</p>
              </div>


              <h3 style="color: var(--text-primary); border-bottom: 1px solid var(--border-color); padding-bottom: 8px; margin-top: 32px;">// Document Setting</h3>
              <div style="color: var(--text-secondary); margin-bottom: 24px;">
                <p style="margin-bottom: 12px; line-height: 1.6;"><strong>[Paper Size]</strong><br>A4</p>
                <p style="margin-bottom: 12px; line-height: 1.6;"><strong>[Margins]</strong><br>Left = 13mm<br>Right = 10mm<br>Top = 5mm<br>Bottom = 5mm</p>
              </div>

            </div>
          `
        },
        hasIframe: false
      }
    ];

    let currentProject = -1;
    let currentTab = 'docs';

    const sidebarNav = document.getElementById('sidebarNav');
    const docsPanel = document.getElementById('docsPanel');
    const livePanel = document.getElementById('livePanel');
    const iframeContainer = document.getElementById('iframeContainer');
    const sidebar = document.getElementById('sidebar');
    const overlay = document.getElementById('overlay');
    const hamburger = document.getElementById('hamburger');
    const mobileTitle = document.getElementById('mobileTitle');
    const tabBar = document.getElementById('tabBar');
    const tabBtns = document.querySelectorAll('.tab-btn');
    const themeToggle = document.getElementById('themeToggle');

    function getSections() {
      const sections = {};
      projects.forEach((project, index) => {
        if (!sections[project.section]) {
          sections[project.section] = [];
        }
        sections[project.section].push({ ...project, index });
      });
      return sections;
    }

    function renderSidebar() {
      sidebarNav.innerHTML = '';

      const homeBtn = document.createElement('button');
      homeBtn.className = 'nav-item' + (currentProject === -1 ? ' active' : '');
      homeBtn.textContent = 'Home';
      homeBtn.onclick = () => loadHome();
      sidebarNav.appendChild(homeBtn);

      const sections = getSections();
      Object.keys(sections).forEach(sectionName => {
        const section = document.createElement('div');
        section.className = 'nav-section open';

        const sectionHeader = document.createElement('button');
        sectionHeader.className = 'nav-section-header';
        sectionHeader.innerHTML = `<span>${sectionName}</span><span class="chevron">▾</span>`;
        sectionHeader.onclick = () => {
          section.classList.toggle('open');
        };
        section.appendChild(sectionHeader);

        const sectionItems = document.createElement('div');
        sectionItems.className = 'nav-section-items';

        sections[sectionName].forEach(project => {
          const btn = document.createElement('button');
          btn.className = 'nav-item' + (currentProject === project.index ? ' active' : '');
          btn.textContent = project.label;
          btn.onclick = () => loadProject(project.index);
          sectionItems.appendChild(btn);
        });

        section.appendChild(sectionItems);
        sidebarNav.appendChild(section);
      });
    }

    function renderHome() {
      let html = `
        <div class="home-hero">
          <h2>Wafi Dev Hub</h2>
          <p>Welcome to my central portfolio. Browse through the projects below to explore documentation, source code, and live demos of my web tools.</p>
          <div class="home-cta">
             <button class="btn-secondary" onclick="loadProject(0)">Explore Construction Calculator →</button>
             <button class="btn-secondary" onclick="loadProject(1)">Explore Faraid Calculator →</button>
          </div>
        </div>
        <div class="projects-grid">
      `;

      projects.forEach((project, index) => {
        html += `
          <div class="project-card" onclick="loadProject(${index})">
            <h3>${project.label}</h3>
            <p>${project.docs.description}</p>
            <div class="card-tags">
              ${project.docs.techStack.map(t => `<span class="tag">${t}</span>`).join('')}
            </div>
          </div>
        `;
      });

      html += `</div>`;
      docsPanel.innerHTML = html;
    }

    function renderDocs(project) {
      const d = project.docs;
      let html = `
        <div class="doc-header">
          <h2>${d.title}</h2>
          <p>${d.description}</p>
        </div>
      `;

      if (d.techStack.length > 0) {
        html += `
          <div class="doc-section">
            <h3>Tech Stack</h3>
            <div>${d.techStack.map(t => `<span class="tag">${t}</span>`).join('')}</div>
          </div>
        `;
      }

      if (d.features.length > 0) {
        html += `
          <div class="doc-section">
            <h3>Features</h3>
            <ul>${d.features.map(f => `<li>${f}</li>`).join('')}</ul>
          </div>
        `;
      }

      if (d.formulas.length > 0) {
        html += `
          <div class="doc-section">
            <h3>Key Formulas & Constants</h3>
            ${d.formulas.map(f => `<div class="formula-box">${f}</div>`).join('')}
          </div>
        `;
      }

      if (d.notes) {
        html += `
          <div class="doc-section">
            <h3>Notes</h3>
            <div class="doc-notes-content">${d.notes}</div>
          </div>
        `;
      }

      docsPanel.innerHTML = html;
    }

    function renderLiveApp(project) {
      if (!project.hasIframe || !project.iframeSrc) {
        iframeContainer.innerHTML = `
          <div class="iframe-placeholder">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <rect x="2" y="3" width="20" height="14" rx="2" ry="2"></rect>
              <line x1="8" y1="21" x2="16" y2="21"></line>
              <line x1="12" y1="17" x2="12" y2="21"></line>
            </svg>
            <p><strong>Live app not available</strong></p>
            <p style="font-size: 0.9rem; margin-top: 8px;">This tool does not have an embedded live demo yet.</p>
          </div>
        `;
        return;
      }

      iframeContainer.innerHTML = `
        <iframe src="${project.iframeSrc}" 
                title="${project.docs.title} - Live App" 
                sandbox="allow-scripts allow-same-origin allow-forms allow-popups"
                loading="lazy">
        </iframe>
      `;
    }

    function loadHome() {
      currentProject = -1;
      renderSidebar();
      mobileTitle.textContent = 'My Dev Hub';
      tabBar.classList.add('hidden');
      renderHome();
      docsPanel.classList.add('active');
      livePanel.classList.remove('active');
      closeSidebar();
    }

    function loadProject(index) {
      currentProject = index;
      const project = projects[index];
      renderSidebar();
      mobileTitle.textContent = project.label;
      tabBar.classList.remove('hidden');
      renderDocs(project);
      renderLiveApp(project);
      
      // SMART TAB SWITCHING:
      if (project.hasIframe) {
        switchTab('live');
      } else {
        switchTab('docs');
      }
      
      closeSidebar();
    }

    function switchTab(tab) {
      currentTab = tab;
      tabBtns.forEach(btn => {
        if (btn.dataset.tab === tab) {
          btn.classList.add('active');
        } else {
          btn.classList.remove('active');
        }
      });

      if (tab === 'docs') {
        docsPanel.classList.add('active');
        livePanel.classList.remove('active');
      } else {
        docsPanel.classList.remove('active');
        livePanel.classList.add('active');
      }
    }

    function openSidebar() {
      sidebar.classList.add('open');
      overlay.classList.add('open');
      document.body.style.overflow = 'hidden';
    }

    function closeSidebar() {
      sidebar.classList.remove('open');
      overlay.classList.remove('open');
      document.body.style.overflow = '';
    }

    hamburger.addEventListener('click', () => {
      if (sidebar.classList.contains('open')) {
        closeSidebar();
      } else {
        openSidebar();
      }
    });

    overlay.addEventListener('click', closeSidebar);

    tabBtns.forEach(btn => {
      btn.addEventListener('click', () => switchTab(btn.dataset.tab));
    });

    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') {
        closeSidebar();
      }
    });

    window.addEventListener('resize', () => {
      if (window.innerWidth > 768) {
        closeSidebar();
      }
    });

    function applyTheme(theme) {
      document.documentElement.setAttribute('data-theme', theme);
      themeToggle.textContent = theme === 'dark' ? '☀️ Light' : '🌙 Dark';
      localStorage.setItem('theme', theme);
    }

    themeToggle.addEventListener('click', () => {
      const current = document.documentElement.getAttribute('data-theme');
      applyTheme(current === 'dark' ? 'light' : 'dark');
    });

    const savedTheme = localStorage.getItem('theme');
    const systemPrefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
    applyTheme(savedTheme || (systemPrefersDark ? 'dark' : 'light'));

    renderSidebar();
    loadHome();
  </script>
</body>
</html>
